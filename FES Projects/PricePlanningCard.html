<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Planning Card Project</title>
    <link rel="stylesheet" href="PricePlanningCard.css">
</head>
<body>
    <div class="plans">

         <div class="plan-two">
         <h2 class="plan_title"> <i>FREE</i></h2>
            <p class="plan_price">$0<span>/month</span></p>

            <ul class="plan_features">
                <li class="plan_feature">Free Hour Consultation</li>
                <li class="plan_feature">Free Trial Mockup</li>
                <li class="plan_feature">No Fees Until Final Agreement</li>
            </ul>

            <button class="plan_button">Get Started</button>
        </div>

        <div class="plan-three">
                     <h2 class="plan_title"> <i>ENTERPRISE</i></h2>
            <p class="plan_price">$65<span>/month</span></p>

            <ul class="plan_features">
                <li class="plan_feature">Three Projects</li>
                <li class="plan_feature">Three Mockups</li>
                <li class="plan_feature">Scheduled Timeline</li>
            </ul>
            <button class="plan_button">Get Started</button>
        </div>

        <div class="plan-one">
            <h2 class="plan_title"> <i>PREMIERE</i></h2>
            <p class="plan_price">$125<span>/month</span></p>

            <ul class="plan_features">
                <li class="plan_feature">Unlimited Projects</li>
                <li class="plan_feature">Team Collaboration</li>
                <li class="plan_feature">Priority Support</li>
            </ul>

            <button class="plan_button">Get Started</button>
         </div>
     </div>
</body>
</html>
