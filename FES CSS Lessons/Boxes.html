<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning how to Design a Box</title>
    <link rel="stylesheet" href="Boxes.css">

</head>
<body>
    <div class="card">
        <h2>My Favorite Place</h2>
        <p>Peacful park, morning walks, and sunshine on my face</p>
    </div>
    <div class="box">
        <h2>Centered Card</h2>
        <p>This entire box-and its text-are perfectly centered</p>
    </div>
</body>
</html>
